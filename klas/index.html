<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Klas">
<meta name="theme-color" content="#fff7e6">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Klas</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
  html, body { margin: 0; padding: 0; background: #fff7e6; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif; overscroll-behavior: none; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
  body { min-height: 100vh; min-height: 100dvh; padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(16px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 12px; max-width: 1200px; margin: 0 auto; }

  /* --- Section --- */
  section.taal-section { padding: 14px 14px 16px; border-radius: 24px; transition: opacity .2s ease; }
  section.taal-section h2 { font-size: 13px; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: 0.10em; margin: 0 0 12px 4px; font-weight: 800; }
  section.boeken   { background: rgba(255, 193, 77, 0.13); }
  section.liedjes  { background: rgba(95, 195, 76, 0.13); }
  section.verhalen { background: rgba(108, 140, 255, 0.13); }
  section.taal-section.empty { display: none; }
  section.taal-section.dim { opacity: 0; pointer-events: none; }

  /* --- Grid (matches rhymes/index.html breakpoints) --- */
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }

  /* --- Tile (same as grid.html) --- */
  .tile { aspect-ratio: 1 / 1; border: 4px solid transparent; border-radius: 22px; padding: 0; background: #fff; cursor: pointer; overflow: hidden; position: relative; box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 8px 18px rgba(0,0,0,0.08); transition: transform .08s ease, box-shadow .08s ease; font-family: inherit; }
  .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.08); }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  .tile .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 12px 14px 12px; background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0)); color: #fff; font-weight: 800; font-size: clamp(15px, 2vw, 19px); text-shadow: 0 2px 6px rgba(0,0,0,0.5); letter-spacing: -0.01em; }
  .tile.pressing { transform: scale(0.94); filter: brightness(1.12); }

  /* --- Bottom navigation banner --- */
  :root { --bar-h: 92px; --bar-pad: 10px; --bar-gap: 8px; }
  body { padding-bottom: calc(var(--bar-h) + var(--bar-pad) * 2 + max(8px, env(safe-area-inset-bottom))); }

  .bottombar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
    padding: var(--bar-pad) var(--bar-pad) max(var(--bar-pad), env(safe-area-inset-bottom)) var(--bar-pad);
    background: rgba(255, 247, 230, 0.96);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.10);
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: var(--bar-gap);
  }
  .bottombar > button {
    height: var(--bar-h); padding: 0; border-radius: 18px; border: 3px solid #fff;
    background: #fff; overflow: hidden; cursor: pointer; font-family: inherit;
    position: relative;
  }
  .bottombar .navtile img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  .bottombar .navtile.active { border-color: #ff7043; box-shadow: 0 0 0 3px rgba(255,112,67,0.25); }
  .bottombar .stopbtn { background: #e53935; border-color: #fff; display: flex; align-items: center; justify-content: center; }
  .bottombar .stopbtn svg { width: 56%; height: 56%; fill: #fff; pointer-events: none; }
  .bottombar > button.pressing { transform: scale(0.94); filter: brightness(1.12); }

  /* --- Playing-mode lockdown: nav-tiles dimmed, stop pulses --- */
  body.playing .bottombar { background: rgba(0,0,0,0.85); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }
  body.playing .bottombar .navtile { opacity: 0.18; filter: grayscale(1); pointer-events: none; transition: opacity .2s, filter .2s; }
  body.playing .bottombar .stopbtn { animation: stoppulse 1.2s ease-in-out infinite; }
  @keyframes stoppulse {
    0%   { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.7); transform: scale(1.0); }
    50%  { box-shadow: 0 0 0 22px rgba(229, 57, 53, 0); transform: scale(1.05); }
    100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); transform: scale(1.0); }
  }

  /* --- Full-screen still playback overlay (sits above grid, BELOW bottombar) --- */
  .player {
    position: fixed; left: 0; right: 0; top: 0;
    bottom: calc(var(--bar-h) + var(--bar-pad) * 2 + max(8px, env(safe-area-inset-bottom)));
    background: #000; display: none; z-index: 50;
  }
  .player.visible { display: block; }
  .player img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
</style>
</head>
<body data-page="klas">
  <section class="taal-section boeken" data-section="boeken">
    <h2>Books</h2>
    <div class="grid" data-grid="boeken"></div>
  </section>
  <section class="taal-section liedjes" data-section="liedjes">
    <h2>Songs</h2>
    <div class="grid" data-grid="liedjes"></div>
  </section>
  <section class="taal-section verhalen" data-section="verhalen">
    <h2>Stories</h2>
    <div class="grid" data-grid="verhalen"></div>
  </section>

  <div class="player" id="player"><img id="player-img" alt=""></div>

  <nav class="bottombar" id="bottombar" aria-label="navigatie">
    <button class="navtile" id="nav-mama" data-href="/liedjes/mama/" data-nav="mama" aria-label="mama"><img src="/liedjes/home/mama.jpg" alt=""></button>
    <button class="navtile" id="nav-papa" data-href="/liedjes/papa/" data-nav="papa" aria-label="papa"><img src="/liedjes/home/papa.jpg" alt=""></button>
    <button class="navtile" id="nav-klas" data-href="/liedjes/klas/" data-nav="klas" aria-label="klas"><img src="/liedjes/home/klas.jpg" alt=""></button>
    <button class="stopbtn" id="stopbtn" aria-label="stop"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
  </nav>

<script>
// --- Service worker ---
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(() => schedulePrefetch())
      .catch(() => {});
  });
}

// --- Toddler-proofing ---
document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
document.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
document.addEventListener("gestureend", e => e.preventDefault(), { passive: false });
let lastTouchEnd = 0;
document.addEventListener("touchend", e => { const now = Date.now(); if (now - lastTouchEnd <= 350) e.preventDefault(); lastTouchEnd = now; }, { passive: false });
document.addEventListener("touchstart", e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("touchmove", e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dblclick", e => e.preventDefault());

const ALL_TRACKS = [{"n": 1, "title": "Nursery Rhymes", "href": "/liedjes/rhymes/", "icon": "/liedjes/rhymes/icons/01.jpg", "_section": "boeken"}, {"n": 1, "title": "Vroom Vroom", "audio": "liedjes/audio/01.mp3", "icon": "liedjes/icons/01.jpg", "_section": "liedjes"}, {"n": 2, "title": "I Love My Garbage Truck", "audio": "liedjes/audio/02.mp3", "icon": "liedjes/icons/02.jpg", "_section": "liedjes"}, {"n": 3, "title": "Driving In My Car", "audio": "liedjes/audio/03.mp3", "icon": "liedjes/icons/03.jpg", "_section": "liedjes"}, {"n": 4, "title": "Here Comes The Firetruck", "audio": "liedjes/audio/04.mp3", "icon": "liedjes/icons/04.jpg", "_section": "liedjes"}, {"n": 5, "title": "Baby Shark", "audio": "liedjes/audio/05.mp3", "icon": "liedjes/icons/05.jpg", "_section": "liedjes"}, {"n": 6, "title": "One Little Finger", "audio": "liedjes/audio/06.mp3", "icon": "liedjes/icons/06.jpg", "_section": "liedjes"}, {"n": 7, "title": "The Wheels On The Bus", "audio": "liedjes/audio/07.mp3", "icon": "liedjes/icons/07.jpg", "_section": "liedjes"}, {"n": 1, "title": "The Lion and the Mouse", "audio": "verhalen/audio/01.mp3", "icon": "verhalen/icons/01.jpg", "_section": "verhalen"}];
const SEED_ORDER = ["liedjes:1", "liedjes:2", "liedjes:3", "liedjes:4", "liedjes:5"];
const PARENT_HREF = "/liedjes/";
const STORAGE_PREFIX = "klas";
const APP_VERSION = "klas-c90ee614";

const audio = new Audio();
audio.preload = "none";
audio.playsInline = true;
let currentTile = null;
let currentTrack = null;

// --- Popularity tracking, keyed "<section>:<n>" ---
const POP_KEY = STORAGE_PREFIX + "_plays_v1";
const POP_WINDOW_MS = 14 * 24 * 60 * 60 * 1000;

function trackKey(t) { return `${t._section}:${t.n}`; }
function loadPlays() { try { return JSON.parse(localStorage.getItem(POP_KEY) || "[]"); } catch { return []; } }
function savePlays(arr) { try { localStorage.setItem(POP_KEY, JSON.stringify(arr)); } catch {} }
function recordPlay(t) {
  const now = Date.now(); const cutoff = now - POP_WINDOW_MS;
  const arr = loadPlays().filter(e => e.t >= cutoff);
  arr.push({ k: trackKey(t), t: now }); savePlays(arr);
}

function audioPrefetchOrder() {
  // Only audio tracks (link tiles don't need prefetch). Sort by play count desc, seed order, then natural order.
  const cutoff = Date.now() - POP_WINDOW_MS;
  const arr = loadPlays().filter(e => e.t >= cutoff);
  savePlays(arr);
  const counts = {};
  for (const e of arr) counts[e.k] = (counts[e.k] || 0) + 1;
  const seedRank = {};
  SEED_ORDER.forEach((k, i) => { seedRank[k] = i; });
  const audioTracks = ALL_TRACKS.filter(t => t.audio);
  audioTracks.sort((a, b) => {
    const ka = trackKey(a), kb = trackKey(b);
    const ca = counts[ka] || 0, cb = counts[kb] || 0;
    if (cb !== ca) return cb - ca;
    const sa = seedRank[ka] ?? 999, sb = seedRank[kb] ?? 999;
    if (sa !== sb) return sa - sb;
    return 0;
  });
  return audioTracks;
}

// --- Telemetry (same Worker as before) ---
const TEL_URL = "https://liedjes-logger.super-mud-e2ef.workers.dev/log";
const TEL_BUFFER_KEY = STORAGE_PREFIX + "_tel_buffer_v1";
const TEL_DEVICE_KEY = STORAGE_PREFIX + "_device_id_v1";
const TEL_FLUSH_INTERVAL_MS = 30000;
const TEL_MAX_BUFFER = 2000;
const SESSION_ID = ((crypto.randomUUID && crypto.randomUUID()) || (Date.now() + "-" + Math.random())).slice(0, 36);
let DEVICE_ID = "";
try { DEVICE_ID = localStorage.getItem(TEL_DEVICE_KEY) || ""; if (!DEVICE_ID) { DEVICE_ID = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + "-" + Math.random()); localStorage.setItem(TEL_DEVICE_KEY, DEVICE_ID); } } catch {}
let telBuffer = [];
try { telBuffer = JSON.parse(localStorage.getItem(TEL_BUFFER_KEY) || "[]"); } catch {}
function saveTelBuffer() { try { localStorage.setItem(TEL_BUFFER_KEY, JSON.stringify(telBuffer)); } catch {} }
function tel(type, payload) {
  telBuffer.push({ t: Date.now(), type, ...(payload || {}) });
  if (telBuffer.length > TEL_MAX_BUFFER) telBuffer.splice(0, telBuffer.length - TEL_MAX_BUFFER);
  saveTelBuffer();
}
let telFlushing = false;
async function flushTel(useKeepalive) {
  if (telFlushing || telBuffer.length === 0) return;
  telFlushing = true;
  const batchLen = telBuffer.length;
  const batch = telBuffer.slice(0, batchLen);
  try {
    const resp = await fetch(TEL_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ events: batch, session_id: SESSION_ID, device_id: DEVICE_ID, app_version: APP_VERSION }), keepalive: !!useKeepalive });
    if (resp && resp.ok) { telBuffer.splice(0, batchLen); saveTelBuffer(); }
  } catch {}
  telFlushing = false;
}
setInterval(() => flushTel(false), TEL_FLUSH_INTERVAL_MS);
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushTel(true); });
window.addEventListener("pagehide", () => flushTel(true));
tel("session_start", { ua: navigator.userAgent, vw: window.innerWidth, vh: window.innerHeight, dpr: window.devicePixelRatio || 1, standalone: !!(navigator.standalone || window.matchMedia("(display-mode: standalone)").matches) });

// --- Prefetch ---
async function schedulePrefetch() {
  let worker = navigator.serviceWorker.controller;
  if (!worker) { try { const reg = await navigator.serviceWorker.ready; worker = navigator.serviceWorker.controller || reg.active; } catch {} }
  if (!worker) return;
  const tracks = audioPrefetchOrder();
  const urls = tracks.map(t => encodeURI(t.audio)).filter(Boolean);
  worker.postMessage({ type: "prefetch-mp3s", urls });
}

// --- Full-screen still playback ---
const player = document.getElementById("player");
const playerImg = document.getElementById("player-img");

function showPlayer(track) { playerImg.src = encodeURI(track.icon); player.classList.add("visible"); document.body.classList.add("playing"); document.querySelectorAll('section.taal-section').forEach(s => s.classList.add('dim')); }
function hidePlayer() { player.classList.remove("visible"); document.body.classList.remove("playing"); document.querySelectorAll('section.taal-section').forEach(s => s.classList.remove('dim')); playerImg.src = ""; }

let isPlaying = false;
let currentSongKey = null;
let lastProgressLog = 0;

function emitPlayEnd(reason) {
  if (currentSongKey == null) return;
  const dur = audio.duration || 0, cur = audio.currentTime || 0;
  const pct = dur > 0 ? +(cur / dur).toFixed(3) : 0;
  tel("play_end", { k: currentSongKey, elapsed_ms: Math.round(cur * 1000), duration_ms: Math.round(dur * 1000), pct, reason, real_tap: pct >= 0.4 });
  currentSongKey = null;
}

function stop() {
  emitPlayEnd("stop");
  audio.pause(); audio.currentTime = 0;
  currentTrack = null; currentTile = null;
  isPlaying = false;
  hidePlayer();
}

function play(track, tile) {
  // No toggle: re-tap on same tile during play is ignored (player overlay covers tiles anyway).
  if (isPlaying) return;
  emitPlayEnd("replaced");
  audio.src = encodeURI(track.audio);
  isPlaying = true;  // optimistic — covers the load window between tap and audio.play resolving
  document.body.classList.add("playing");
  audio.play().then(() => {
    currentTile = tile; currentTrack = track; currentSongKey = trackKey(track);
    showPlayer(track); recordPlay(track);
    tel("play_start", { k: currentSongKey });
  }).catch((err) => {
    isPlaying = false;
    document.body.classList.remove("playing");
    hidePlayer();
    tel("play_fail", { k: trackKey(track), err: String(err && err.message || err).slice(0, 120) });
  });
}

audio.addEventListener("ended", () => { emitPlayEnd("ended"); isPlaying = false; hidePlayer(); currentTrack = null; });
audio.addEventListener("timeupdate", () => {
  const now = Date.now();
  if (now - lastProgressLog < 2000 || currentSongKey == null) return;
  lastProgressLog = now;
  const dur = audio.duration || 0, cur = audio.currentTime || 0;
  tel("play_progress", { k: currentSongKey, elapsed_ms: Math.round(cur * 1000), duration_ms: Math.round(dur * 1000), pct: dur > 0 ? +(cur / dur).toFixed(3) : 0 });
});

// Player overlay has NO tap handler — tapping the song image does nothing.
// The only way to stop a playing song is the red stop button in the bottombar.

// --- Tile tap detection (toddler-tuned) ---
const MIN_TAP_MS = 20;          // 2026-05-20: lowered from 65 — logs showed valid William taps at 30-60ms getting rejected
const MAX_TAP_MS = 1500;
const MAX_TAP_DRIFT_PX = 50;
const PALM_RADIUS_PX = 60;  // touches above this radius are treated as palm and ignored

function attachTileHandlers(btn, track) {
  const candidates = new Map();
  btn.addEventListener("touchstart", e => {
    if (isPlaying) return;  // grid is locked while a song plays
    for (const t of e.changedTouches) {
      const r0 = Math.max(t.radiusX || 0, t.radiusY || 0);
      if (r0 > PALM_RADIUS_PX) {
        tel("palm_reject", { where: "tile", k: trackKey(track), r: Math.round(r0), x: Math.round(t.clientX), y: Math.round(t.clientY) });
        continue;
      }
      candidates.set(t.identifier, { t0: Date.now(), x0: t.clientX, y0: t.clientY, r0, maxDrift: 0, drifted: false });
      btn.classList.add("pressing");
      tel("touchstart", { k: trackKey(track), x: Math.round(t.clientX), y: Math.round(t.clientY), r: Math.round(r0), touches: e.touches.length });
    }
  }, { passive: true });
  btn.addEventListener("touchmove", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      if (!c) continue;
      const d = Math.hypot(t.clientX - c.x0, t.clientY - c.y0);
      if (d > c.maxDrift) c.maxDrift = d;
      if (!c.drifted && d > MAX_TAP_DRIFT_PX) c.drifted = true;
    }
  }, { passive: true });
  btn.addEventListener("touchend", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      candidates.delete(t.identifier);
      if (candidates.size === 0) btn.classList.remove("pressing");
      if (!c) continue;
      const dur = Date.now() - c.t0;
      const r = Math.max(t.radiusX || 0, t.radiusY || 0);
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const onTile = el === btn || btn.contains(el);
      let decision;
      if (c.drifted)              decision = "drifted";
      else if (!onTile)           decision = "off_tile";
      else if (dur < MIN_TAP_MS)  decision = "too_short";
      else if (dur > MAX_TAP_MS)  decision = "too_long";
      else                        decision = "play";
      tel("touchend", { k: trackKey(track), dur_ms: dur, r_start: Math.round(c.r0), r_end: Math.round(r), drift_max: Math.round(c.maxDrift), on_tile: onTile, decision });
      if (decision === "play") {
        e.preventDefault();
        if (track.href) { window.location = track.href; }
        else if (track.audio) { play(track, btn); }
        return;
      }
    }
  }, { passive: false });
  btn.addEventListener("touchcancel", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      candidates.delete(t.identifier);
      tel("touchcancel", { k: trackKey(track), dur_ms: c ? Date.now() - c.t0 : null, drift_max: c ? Math.round(c.maxDrift) : null });
    }
    if (candidates.size === 0) btn.classList.remove("pressing");
  }, { passive: true });
  btn.addEventListener("click", e => {
    if ("ontouchstart" in window) return;
    if (e.detail === 0) return;
    if (isPlaying) return;
    tel("click", { k: trackKey(track) });
    if (track.href) window.location = track.href;
    else if (track.audio) play(track, btn);
  });
}

// --- Bottom-bar handlers (nav + stop) ---
function attachBarButton(btn, opts) {
  // opts: { kind: "nav" | "stop", href, label, lockable }
  const candidates = new Map();
  btn.addEventListener("touchstart", e => {
    if (opts.lockable && isPlaying) return;  // nav locked during play
    for (const t of e.changedTouches) {
      const r0 = Math.max(t.radiusX || 0, t.radiusY || 0);
      if (r0 > PALM_RADIUS_PX) {
        tel("palm_reject", { where: opts.kind, label: opts.label, r: Math.round(r0) });
        continue;
      }
      candidates.set(t.identifier, { t0: Date.now(), x0: t.clientX, y0: t.clientY, drifted: false, r0 });
      btn.classList.add("pressing");
      tel("bar_touchstart", { kind: opts.kind, label: opts.label, r: Math.round(r0) });
    }
  }, { passive: true });
  btn.addEventListener("touchmove", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      if (!c) continue;
      const d = Math.hypot(t.clientX - c.x0, t.clientY - c.y0);
      if (d > MAX_TAP_DRIFT_PX) c.drifted = true;
    }
  }, { passive: true });
  btn.addEventListener("touchend", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      candidates.delete(t.identifier);
      if (candidates.size === 0) btn.classList.remove("pressing");
      if (!c) continue;
      const dur = Date.now() - c.t0;
      const r = Math.max(t.radiusX || 0, t.radiusY || 0);
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const onBtn = el === btn || btn.contains(el);
      let decision;
      if (c.drifted)              decision = "drifted";
      else if (!onBtn)            decision = "off_tile";
      else if (dur < MIN_TAP_MS)  decision = "too_short";
      else if (dur > MAX_TAP_MS)  decision = "too_long";
      else                        decision = "fire";
      tel("bar_touchend", { kind: opts.kind, label: opts.label, dur_ms: dur, r_start: Math.round(c.r0), r_end: Math.round(r), on_btn: onBtn, decision });
      if (decision === "fire") {
        e.preventDefault();
        if (opts.kind === "stop") {
          if (isPlaying) { stop(); }
          else { window.location = PARENT_HREF; }
        } else if (opts.kind === "nav" && opts.href) {
          if (isPlaying) return;  // double-safety
          window.location = opts.href;
        }
        return;
      }
    }
  }, { passive: false });
  btn.addEventListener("touchcancel", e => {
    for (const t of e.changedTouches) {
      candidates.delete(t.identifier);
    }
    if (candidates.size === 0) btn.classList.remove("pressing");
  }, { passive: true });
  btn.addEventListener("click", e => {
    if ("ontouchstart" in window) return;
    if (e.detail === 0) return;
    if (opts.lockable && isPlaying) return;
    tel("bar_click", { kind: opts.kind, label: opts.label });
    if (opts.kind === "stop") {
      if (isPlaying) { stop(); }
      else { window.location = PARENT_HREF; }
    } else if (opts.kind === "nav" && opts.href) {
      window.location = opts.href;
    }
  });
}

// --- Build sections ---
function build() {
  const bySection = { boeken: [], liedjes: [], verhalen: [] };
  ALL_TRACKS.forEach(t => { if (bySection[t._section]) bySection[t._section].push(t); });

  for (const [section, tracks] of Object.entries(bySection)) {
    const grid = document.querySelector(`[data-grid="${section}"]`);
    const sec = document.querySelector(`section[data-section="${section}"]`);
    if (!grid || !sec) continue;
    if (tracks.length === 0) { sec.classList.add("empty"); continue; }
    tracks.forEach(track => {
      const btn = document.createElement("button");
      btn.className = "tile";
      btn.setAttribute("aria-label", `${track.title}`);
      const labelHtml = track.href ? `<div class="label">${track.title}</div>` : "";
      btn.innerHTML = `<img src="${encodeURI(track.icon)}" alt="">${labelHtml}`;
      attachTileHandlers(btn, track);
      grid.appendChild(btn);
    });
  }
}

// Wire bottom-bar buttons
const PAGE = document.body.dataset.page;  // "mama" | "papa" | "klas"
["mama", "papa", "klas"].forEach(name => {
  const btn = document.getElementById("nav-" + name);
  if (!btn) return;
  if (name === PAGE) btn.classList.add("active");
  attachBarButton(btn, { kind: "nav", href: btn.dataset.href, label: name, lockable: true });
});
attachBarButton(document.getElementById("stopbtn"), { kind: "stop", label: "stop", lockable: false });

build();
</script>
</body>
</html>
