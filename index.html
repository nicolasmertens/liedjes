<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#fff7e6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Williams">
<link rel="manifest" href="manifest.json">
<title>Williams</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
  html, body { margin: 0; padding: 0; background: #fff7e6; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif; min-height: 100vh; min-height: 100dvh; overscroll-behavior: none; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
  body { padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(16px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; width: 100%; max-width: 900px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; max-width: 480px; } }

  button.tile { display: block; aspect-ratio: 1 / 1; border: 0; border-radius: 26px; overflow: hidden; position: relative; background: #fff; padding: 0; cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 8px 18px rgba(0,0,0,0.08); transition: transform .08s ease, box-shadow .08s ease, filter .08s ease; }
  button.tile:active, button.tile.pressing { transform: translateY(2px) scale(0.98); filter: brightness(1.08); box-shadow: 0 2px 0 rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.08); }
  button.tile img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  button.tile .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 16px; background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0)); color: #fff; font-weight: 800; font-size: clamp(18px, 2.4vw, 22px); text-shadow: 0 2px 6px rgba(0,0,0,0.5); letter-spacing: -0.01em; pointer-events: none; }

  /* Image fallback when home/{taal}.jpg is missing */
  button.tile .text-fallback { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(28px, 5vw, 48px); color: #2b2b2b; background: linear-gradient(135deg, #ffd8a8, #ffa94d); }
  button.tile img.missing { display: none; }
  button.tile img.missing + .text-fallback { display: flex; }
</style>
</head>
<body>
  <main class="grid">
    <button class="tile" data-href="/liedjes/mama/" data-label="mama" aria-label="Mama">
      <img src="home/mama.jpg" alt="" onerror="this.classList.add('missing')">
      <div class="text-fallback">Mama</div>
      <div class="label">Mama</div>
    </button>
    <button class="tile" data-href="/liedjes/papa/" data-label="papa" aria-label="Papa">
      <img src="home/papa.jpg" alt="" onerror="this.classList.add('missing')">
      <div class="text-fallback">Papa</div>
      <div class="label">Papa</div>
    </button>
    <button class="tile" data-href="/liedjes/klas/" data-label="klas" aria-label="Klas">
      <img src="home/klas.jpg" alt="" onerror="this.classList.add('missing')">
      <div class="text-fallback">Klas</div>
      <div class="label">Klas</div>
    </button>
  </main>
<script>
// Unregister any service worker still registered at the root scope.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => {
      if (r.scope.endsWith("/liedjes/") || r.scope.endsWith("nicolasmertens.github.io/")) {
        r.unregister().catch(() => {});
      }
    });
  }).catch(() => {});
}

// --- Toddler-proofing: kill all browser gestures (mirrors templates/taal.html) ---
document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
document.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
document.addEventListener("gestureend", e => e.preventDefault(), { passive: false });

let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 350) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener("touchstart", e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("touchmove",  e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dblclick",    e => e.preventDefault());

// --- Telemetry ---
const TEL_URL = "https://liedjes-logger.super-mud-e2ef.workers.dev/log";
const STORAGE_PREFIX = "liedjes_home";
const APP_VERSION = "home-2026-05-20";
const TEL_BUFFER_KEY = STORAGE_PREFIX + "_tel_buffer_v1";
const TEL_DEVICE_KEY = STORAGE_PREFIX + "_device_id_v1";
const TEL_FLUSH_INTERVAL_MS = 30000;
const TEL_MAX_BUFFER = 2000;

const SESSION_ID = ((crypto.randomUUID && crypto.randomUUID()) || (Date.now() + "-" + Math.random())).slice(0, 36);
let DEVICE_ID = "";
try {
  DEVICE_ID = localStorage.getItem(TEL_DEVICE_KEY) || "";
  if (!DEVICE_ID) { DEVICE_ID = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + "-" + Math.random()); localStorage.setItem(TEL_DEVICE_KEY, DEVICE_ID); }
} catch {}

let telBuffer = [];
try { telBuffer = JSON.parse(localStorage.getItem(TEL_BUFFER_KEY) || "[]"); } catch {}
function saveTelBuffer() { try { localStorage.setItem(TEL_BUFFER_KEY, JSON.stringify(telBuffer)); } catch {} }
function tel(type, payload) {
  telBuffer.push({ t: Date.now(), type, ...(payload || {}) });
  if (telBuffer.length > TEL_MAX_BUFFER) telBuffer.splice(0, telBuffer.length - TEL_MAX_BUFFER);
  saveTelBuffer();
}

let telFlushing = false;
async function flushTel(useKeepalive) {
  if (telFlushing || telBuffer.length === 0) return;
  telFlushing = true;
  const batchLen = telBuffer.length;
  const batch = telBuffer.slice(0, batchLen);
  try {
    const resp = await fetch(TEL_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ events: batch, session_id: SESSION_ID, device_id: DEVICE_ID, app_version: APP_VERSION }),
      keepalive: !!useKeepalive,
    });
    if (resp && resp.ok) { telBuffer.splice(0, batchLen); saveTelBuffer(); }
  } catch {}
  telFlushing = false;
}
setInterval(() => flushTel(false), TEL_FLUSH_INTERVAL_MS);
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushTel(true); });
window.addEventListener("pagehide", () => flushTel(true));
window.addEventListener("pageshow",  e => tel("pageshow", { persisted: !!e.persisted }));
tel("home_session_start", { ua: navigator.userAgent, vw: window.innerWidth, vh: window.innerHeight, dpr: window.devicePixelRatio || 1, standalone: !!(navigator.standalone || window.matchMedia("(display-mode: standalone)").matches) });

// --- Tile tap detection (mirrors templates/taal.html bar nav-tile pattern) ---
const PALM_RADIUS_PX  = 60;
const MIN_TAP_MS      = 65;
const MAX_TAP_MS      = 1500;
const MAX_TAP_DRIFT_PX = 50;

function attachTileHandlers(btn) {
  const href  = btn.dataset.href;
  const label = btn.dataset.label;
  const candidates = new Map();

  btn.addEventListener("touchstart", e => {
    for (const t of e.changedTouches) {
      const r0 = Math.max(t.radiusX || 0, t.radiusY || 0);
      if (r0 > PALM_RADIUS_PX) {
        tel("home_palm_reject", { label, r: Math.round(r0) });
        continue;
      }
      candidates.set(t.identifier, { t0: Date.now(), x0: t.clientX, y0: t.clientY, drifted: false, r0 });
      btn.classList.add("pressing");
      tel("home_touchstart", { label, r: Math.round(r0), touches: e.touches.length });
    }
  }, { passive: true });

  btn.addEventListener("touchmove", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      if (!c) continue;
      const d = Math.hypot(t.clientX - c.x0, t.clientY - c.y0);
      if (d > MAX_TAP_DRIFT_PX) c.drifted = true;
    }
  }, { passive: true });

  btn.addEventListener("touchend", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      candidates.delete(t.identifier);
      if (candidates.size === 0) btn.classList.remove("pressing");
      if (!c) continue;
      const dur = Date.now() - c.t0;
      const r = Math.max(t.radiusX || 0, t.radiusY || 0);
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const onBtn = el === btn || btn.contains(el);
      let decision;
      if (c.drifted)             decision = "drifted";
      else if (!onBtn)           decision = "off_tile";
      else if (dur < MIN_TAP_MS) decision = "too_short";
      else if (dur > MAX_TAP_MS) decision = "too_long";
      else                       decision = "fire";
      tel("home_touchend", { label, dur_ms: dur, r_start: Math.round(c.r0), r_end: Math.round(r), on_btn: onBtn, decision });
      if (decision === "fire") {
        e.preventDefault();
        window.location = href;
        return;
      }
    }
  }, { passive: false });

  btn.addEventListener("touchcancel", e => {
    for (const t of e.changedTouches) candidates.delete(t.identifier);
    if (candidates.size === 0) btn.classList.remove("pressing");
    tel("home_touchcancel", { label });
  }, { passive: true });

  btn.addEventListener("click", e => {
    if ("ontouchstart" in window) return;
    if (e.detail === 0) return;
    tel("home_click", { label });
    window.location = href;
  });
}

document.querySelectorAll("button.tile").forEach(attachTileHandlers);
</script>
</body>
</html>
