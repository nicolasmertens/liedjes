<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Liedjes">
<meta name="theme-color" content="#fff7e6">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Liedjes</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: pan-y;          /* allow vertical scroll, block pinch */
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #fff7e6;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
    overscroll-behavior: none;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (max-width: 820px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
  .tile {
    aspect-ratio: 1 / 1;
    border: 4px solid transparent;
    border-radius: 22px;
    padding: 0;
    background: #fff;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 8px 18px rgba(0,0,0,0.08);
    transition: transform .08s ease, box-shadow .08s ease, border-color .15s ease;
    font-family: inherit;
  }
  .tile:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.08);
  }
  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
  .tile .num {
    position: absolute;
    top: 6px;
    left: 10px;
    font-size: clamp(20px, 2.4vw, 28px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 2px rgba(0,0,0,0.8);
    letter-spacing: -0.02em;
    pointer-events: none;
  }
  .tile.playing {
    border-color: #ff6b6b;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .tile.playing::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #ff6b6b;
    box-shadow: 0 0 0 0 rgba(255,107,107,0.7);
    animation: dot 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
    50% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
  }
  .stopbar {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    padding: 12px max(16px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right));
    background: linear-gradient(to top, rgba(255,247,230,0.98), rgba(255,247,230,0.85) 70%, rgba(255,247,230,0));
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s ease;
  }
  .stopbar.visible { opacity: 1; pointer-events: auto; }
  .stopbtn {
    border: none;
    background: #2b2b2b;
    color: #fff;
    font-family: inherit;
    font-weight: 800;
    font-size: 18px;
    padding: 16px 32px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 10px 20px rgba(0,0,0,0.15);
  }
  .stopbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
</style>
</head>
<body>
  <main class="grid" id="grid"></main>
  <div class="stopbar" id="stopbar"><button class="stopbtn" id="stopbtn">Stop</button></div>

<script>
// --- Service worker: auto-update HTML on next visit, offline fallback ---
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}

// --- Toddler-proofing: kill all browser gestures ---
// 1. Block iOS Safari pinch-zoom gestures completely
document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
document.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
document.addEventListener("gestureend", e => e.preventDefault(), { passive: false });

// 2. Block double-tap-to-zoom (only fire click on single-tap)
let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 350) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// 3. If more than one finger touches, cancel the touch — prevents palm + finger
//    triggering pinch / weird states
document.addEventListener("touchstart", e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
document.addEventListener("touchmove", e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// 4. Block context menu / long-press callout
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dblclick", e => e.preventDefault());

const songs = [
  { n: 1,  title: "Alle Eendjes",              file: "2019/04/01-Alle-EenDJes.mp3" },
  { n: 2,  title: "Parapluutje",               file: "2019/04/02-Parapluutje.mp3" },
  { n: 3,  title: "Twee Handjes",              file: "2019/07/03-Twee-HanDJes.mp3" },
  { n: 4,  title: "Op Een Grote Paddenstoel",  file: "2019/07/04-Op-Een-Grote-Paddenstoel.mp3" },
  { n: 5,  title: "Dit Zijn Mijn Wangetjes",   file: "2019/04/05-Dit-Zijn-Mijn-Wangetjes.mp3" },
  { n: 6,  title: "Onder Moeders Paraplu",     file: "2019/04/06-Onder-Moeders-Paraplu.mp3" },
  { n: 7,  title: "Eén, Twee, Drie",           file: "2019/04/07-Eén-Twee-Drie.mp3" },
  { n: 8,  title: "Slaap Kindje, Slaap",       file: "2019/04/08-Slaap-KinDJe-Slaap.mp3" },
  { n: 9,  title: "Klein, Klein Kleutertje",   file: "2019/04/09-Klein-Klein-Kleutertje.mp3" },
  { n:10,  title: "Hoofd En Schouders",        file: "2019/04/10-Hoofd-En-Schouders.mp3" },
  { n:11,  title: "Kom Wat Dichter",           file: "2019/04/11-Kom-Wat-Dichter.mp3" },
  { n:12,  title: "In Een Klein Stationnetje", file: "2019/04/12-In-Een-Klein-Stationnetje.mp3" },
  { n:13,  title: "We Stegen Met Een Zucht",   file: "2019/04/13-We-Stegen-Met-Een-Zucht.mp3" },
  { n:14,  title: "In Het Bos",                file: "2019/04/14-In-Het-Bos.mp3" },
  { n:15,  title: "Eén, Twee, Drie, Vier",     file: "2019/04/15-Eén-Twee-Drie-Vier.mp3" },
  { n:16,  title: "De Kikkertjes",             file: "2019/04/16-De-Kikkertjes.mp3" },
  { n:17,  title: "'k Zag Twee Beren",         file: "2019/04/17-k-Zag-Twee-Beren.mp3" },
  { n:18,  title: "'k Heb De Zon Zien Zakken", file: "2019/04/18-k-Heb-De-Zon-Zien-Zakken.mp3" },
  { n:19,  title: "De Zevensprong",            file: "2019/04/19-De-Zevensprong.mp3" },
  { n:20,  title: "In De Maneschijn",          file: "2019/04/20-In-De-Maneschijn.mp3" },
  { n:21,  title: "'t Regent Op De Brug",      file: "2019/04/21-t-Regent-Op-De-Brug.mp3" },
  { n:22,  title: "'k Heb Een Roosje",         file: "2019/04/22-k-Heb-Een-Roosje.mp3" },
  { n:23,  title: "Roodkapje",                 file: "2019/04/23-Roodkapje.mp3" },
  { n:24,  title: "Zakdoek Leggen",            file: "2019/04/24-Zakdoek-Leggen.mp3" },
  { n:25,  title: "Lang Zal Zij Leven",        file: "2019/04/25-Lang-Zal-Zij-Leven.mp3" },
  { n:26,  title: "O, Wat Zijn We Heden Blij", file: "2019/04/26-O-Wat-Zijn-We-Heden-Blij.mp3" },
];

const FALLBACK_COLOR = "#f06595";
const BASE = "https://www.standaarduitgeverij.be/wp-content/uploads/";

let colorMap = {};
const audio = new Audio();
audio.preload = "none";
audio.playsInline = true;
let currentTile = null;

function setPlaying(tile) {
  if (currentTile && currentTile !== tile) currentTile.classList.remove("playing");
  currentTile = tile;
  if (tile) tile.classList.add("playing");
  document.getElementById("stopbar").classList.toggle("visible", !!tile);
}

function stop() {
  audio.pause();
  audio.currentTime = 0;
  setPlaying(null);
}

function play(song, tile) {
  if (currentTile === tile) { stop(); return; }
  audio.src = encodeURI(BASE + song.file);
  audio.play().then(() => setPlaying(tile)).catch(() => setPlaying(null));
}

audio.addEventListener("ended", () => setPlaying(null));

const grid = document.getElementById("grid");

// Palm rejection settings:
//  - radius threshold: a fingertip is roughly < 25px radius on iPad. A palm
//    or knuckle is wider. We err on the side of letting fingertips through.
//  - duration: a tap is fast (< 800ms). A resting palm tends to stay much
//    longer; if a touch lasts beyond this we ignore the eventual touchend.
//  - movement: if the touch slides far, it's a drag, not a tap.
const PALM_RADIUS_PX = 28;
const MAX_TAP_MS = 800;
const MAX_TAP_DRIFT_PX = 30;

function attachTileHandlers(btn, song) {
  const candidates = new Map(); // touchId -> {t0, x0, y0}

  btn.addEventListener("touchstart", e => {
    for (const t of e.changedTouches) {
      const r = Math.max(t.radiusX || 0, t.radiusY || 0);
      if (r > PALM_RADIUS_PX) continue; // looks like palm; skip
      candidates.set(t.identifier, { t0: Date.now(), x0: t.clientX, y0: t.clientY });
    }
  }, { passive: true });

  btn.addEventListener("touchmove", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      if (!c) continue;
      if (Math.hypot(t.clientX - c.x0, t.clientY - c.y0) > MAX_TAP_DRIFT_PX) {
        candidates.delete(t.identifier);
      }
    }
  }, { passive: true });

  btn.addEventListener("touchend", e => {
    for (const t of e.changedTouches) {
      const c = candidates.get(t.identifier);
      candidates.delete(t.identifier);
      if (!c) continue;
      if (Date.now() - c.t0 > MAX_TAP_MS) continue;
      const r = Math.max(t.radiusX || 0, t.radiusY || 0);
      if (r > PALM_RADIUS_PX) continue;
      // confirm touch ended over the same tile
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el === btn || btn.contains(el)) {
        e.preventDefault();
        play(song, btn);
        return;
      }
    }
  }, { passive: false });

  btn.addEventListener("touchcancel", e => {
    for (const t of e.changedTouches) candidates.delete(t.identifier);
  }, { passive: true });

  // Desktop fallback (mouse clicks). On iOS Safari, click is suppressed when
  // touchend already played; e.detail === 0 also filters out programmatic clicks.
  btn.addEventListener("click", e => {
    if ("ontouchstart" in window) return; // touch device handled via touchend
    if (e.detail === 0) return;
    play(song, btn);
  });
}

function build() {
  songs.forEach((s) => {
    const btn = document.createElement("button");
    btn.className = "tile";
    const key = String(s.n).padStart(2, "0");
    const color = colorMap[key] || FALLBACK_COLOR;
    btn.style.background = color;
    btn.setAttribute("aria-label", `${s.n}. ${s.title}`);
    const hasImg = colorMap[key] !== undefined;
    btn.innerHTML = (hasImg
      ? `<img src="icons/${key}.jpg" alt="">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:clamp(48px,9vw,90px);font-weight:900;">${s.n}</div>`)
      + `<div class="num">${s.n}</div>`;
    attachTileHandlers(btn, s);
    grid.appendChild(btn);
  });
}

fetch("icons/colors.json")
  .then(r => r.ok ? r.json() : {})
  .catch(() => ({}))
  .then(m => { colorMap = m; build(); });

document.getElementById("stopbtn").addEventListener("click", stop);
</script>
</body>
</html>
