<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#fff7e6">
<title>Williams Boeken</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #fff7e6;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }
  body {
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center;
  }
  h1 {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 800; color: #2b2b2b; margin: 8px 0 4px;
    letter-spacing: -0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    width: 100%;
    max-width: 760px;
  }
  @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } }
  a.tile {
    display: block;
    aspect-ratio: 1 / 1;
    border-radius: 26px;
    overflow: hidden;
    position: relative;
    background: #fff;
    text-decoration: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 8px 18px rgba(0,0,0,0.08);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  a.tile:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.08); }
  a.tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .label {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    color: #fff; font-weight: 800; font-size: clamp(18px, 2.4vw, 22px);
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
  <h1>Williams Boeken</h1>
  <main class="grid">
    <a class="tile" href="eendjes/" aria-label="Alle Eendjes">
      <img src="eendjes/icon-512.png" alt="">
      <div class="label">Alle Eendjes</div>
    </a>
    <a class="tile" href="rhymes/" aria-label="Nursery Rhymes">
      <img src="rhymes/icon-512.png" alt="">
      <div class="label">Nursery Rhymes</div>
    </a>
  </main>
<script>
// Unregister any service worker that was registered at the root scope before
// the repo was split into /eendjes/ and /rhymes/. The sub-apps register their
// own SWs at their own scopes; nothing should control the root any more.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => {
      if (r.scope.endsWith("/liedjes/") || r.scope.endsWith("nicolasmertens.github.io/")) {
        r.unregister().catch(() => {});
      }
    });
  }).catch(() => {});
}
</script>
</body>
</html>
